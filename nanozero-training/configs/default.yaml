# Default configuration for nanozero-training v1.0.0.
# All values match SPEC §4 defaults.
# Copy this file and customize for your run ; pass via --config X.yaml.

max_generations: 100   # safety upper bound (run command stops at this)
run_id: ""             # leave empty for auto-generated UUID

selfplay:
  mcts_sims: 400
  temperature: 1.0
  temperature_switch_ply: 30
  dirichlet_alpha: 300       # alpha x 1000 (UCI option format)
  dirichlet_epsilon: 250     # epsilon x 1000
  go_timeout_seconds: 60.0
  worker_seed: 42
  max_game_plies: 400
  games_per_batch: 250
  target_games_per_gen: 500
  worker_restart_every: 1000
  max_consecutive_crashes: 5

train:
  batch_size: 256
  learning_rate: 0.001
  total_epochs: 10
  l2_reg: 0.0001
  replay_window: 10
  num_workers: 4
  shuffle: true
  pin_memory: true
  max_grad_norm: 10000.0      # Lc0-style: very permissive safety net
  use_cosine_schedule: true
  train_seed: 42

eval:
  fastchess_path: "fastchess"
  uci_jar: ""                 # MUST be set: path to nanozero-uci-X.Y.Z.jar
  elo_low: 0.0
  elo_high: 5.0
  alpha: 0.05
  beta: 0.05
  max_games: 2000
  time_control: "10+0.1"
  concurrency: 1
  poll_interval_seconds: 5.0    # phase 10 : aligned with SSE dashboard reactivity

monitor:
  enabled: true
  port: 5000
  host: "127.0.0.1"
  csv_flush_interval_seconds: 60.0
  sse_poll_interval_seconds: 0.5    # phase 10 : SSE server-internal mtime check

paths:
  run_root: "nano-runs/run-001"
  datasets_dir: "datasets"
  models_dir: "models"
  monitoring_dir: "monitoring"
  versions_yaml: "versions.yaml"
  pgn_path: "monitoring/sprt.pgn"
  uci_jar: ""                 # absolute or relative ; MUST be set
